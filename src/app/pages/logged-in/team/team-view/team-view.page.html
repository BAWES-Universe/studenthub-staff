<ion-header [class.add-border]="borderLimit" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/company-list"></ion-back-button>
    </ion-buttons>
    <ion-title *ngIf="staff">{{ staff.staff_name }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content scrollEvents="true" (ionScroll)="logScrolling($event)">

  <ion-list *ngIf="!loading && staff">
    <section>
      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Name</h3>
          <p>{{ staff.staff_name }}</p>
        </ion-label>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Email</h3>
          <p>{{ staff.staff_email }}</p>
        </ion-label>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Status</h3>
          <p>
            <ion-badge class="company_status_badge" slot="end" color="danger" *ngIf="!staff.staff_status">
              Inactive
            </ion-badge>
            <ion-badge class="company_status_badge" slot="end" color="success" *ngIf="staff.staff_status">
              Active
            </ion-badge>
          </p>
        </ion-label>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Created On</h3>
          <p>{{ staff.staff_created_at | date }}</p>
        </ion-label>
      </ion-item>

      <ion-item>
        <div tabindex="0"></div>
        <ion-label>
          <h3>Updated On</h3>
          <p>{{ staff.staff_updated_at | date }}</p>
        </ion-label>
      </ion-item>
    </section>
  </ion-list>

  <loading-modal [loading]="loading" type="candidate-list"></loading-modal>

</ion-content>
