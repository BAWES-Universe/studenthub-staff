<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="close()">
        <ion-icon name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ operation }}</ion-title>
    <ion-buttons slot="end">
      <ion-button color="primary"
              [disabled]="!form.valid && loading"
              (click)="save()">
        <span *ngIf="!loading">Save</span>
        <ion-spinner *ngIf="loading"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">
    <ion-list>
      <ion-item>
        <ion-label position="floating">Name</ion-label>
        <ion-input type="text" formControlName="name"></ion-input>
      </ion-item>
      <ion-item>
        <ion-label>Brand</ion-label>
        <ion-select value="brown" okText="Okay" cancelText="Dismiss" formControlName="brand">
          <ion-select-option value="" >Select Brand</ion-select-option>
            <ion-select-option value="{{brand.brand_uuid}}" *ngFor="let brand of brands">{{brand.brand_name_en}}</ion-select-option>
        </ion-select>
      </ion-item>

    </ion-list>
  </form>
</ion-content>
