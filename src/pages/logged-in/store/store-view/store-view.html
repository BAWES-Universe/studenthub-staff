<ion-header>
  <ion-navbar>
    <button ion-button menuToggle="left">
      <ion-icon name="menu"></ion-icon>
    </button>

    <ion-title>{{ store.store_name }}</ion-title>

    <ion-buttons right>
      <button ion-button (click)="update()">
        Update
      </button>
    </ion-buttons>
  </ion-navbar>
</ion-header>

<ion-content>

  <ion-list>
    <ion-list-header>
      Candidates <ion-badge color="dark" *ngIf="store.candidates">{{ store.candidates.length }}</ion-badge>
    </ion-list-header>
    <button ion-item *ngFor="let candidate of store.candidates" (click)="candidateSelected(candidate)">
      {{ candidate.candidate_name }}
    </button>
  </ion-list>

</ion-content>
